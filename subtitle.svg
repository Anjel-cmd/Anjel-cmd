<svg width="600" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .violet {
        fill: #A855F7;
        filter: url(#glow);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
    </style>
  </defs>
  <text x="300" y="38" font-family="Georgia, serif" font-size="22"
        text-anchor="middle" fill="#9ca3af">
    Passion in
    <tspan class="violet"> Design</tspan>
    <tspan fill="#9ca3af"> · Passion in</tspan>
    <tspan class="violet"> Code</tspan>
  </text>
</svg>
