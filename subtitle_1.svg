<svg width="600" height="40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .lavender {
        fill: #E0B0FF;
        filter: url(#glow);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
    </style>
  </defs>
  <text x="300" y="26" font-family="Georgia, serif" font-size="17"
        text-anchor="middle" fill="#9ca3af">
    Passion in
    <tspan class="lavender"> Design</tspan>
    <tspan fill="#9ca3af"> · Passion in</tspan>
    <tspan class="lavender"> Code</tspan>
  </text>
</svg>